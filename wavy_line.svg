<!-- A wavy line -->
<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <path id="wave" d="M20 80 C 40 10, 65 10, 95 80 S 150 150, 180 80" stroke="#000000" stroke-width="8">
    <animate attributeName="d" values="M20 80 C 40 10, 65 10, 95 80 S 150 150, 180 80; M20 80 C 40 150, 65 150, 95 80 S 150 10, 180 80; M20 80 C 40 10, 65 10, 95 80 S 150 150, 180 80" dur="3s" repeatCount="indefinite"/>
  </path>
  <circle id="dot" cx="20" cy="80" r="8" fill="#000000">
    <animate attributeName="cx" values="20; 180; 20" dur="6s" repeatCount="indefinite"/>
  </circle>
</svg>
